<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOMENTUM v4 | BY PICKLEMUNCHER417</title>

<style>
body { font-family: 'Courier New', Courier, monospace; background: #050505; color: #00ff00; padding: 20px; }
h1 { text-align: center; color: #fff; text-shadow: 0 0 10px #00d4ff; margin-bottom: 5px; }
.credit { text-align: center; color: #00ff00; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 40px; }
.op-card { background: #111; padding: 12px; border: 1px solid #333; border-radius: 4px; display: flex; flex-direction: column; }
.weapon { color: #888; font-size: 0.75em; margin-bottom: 8px; }
button { background: #00ff00; color: #000; border: none; padding: 8px; cursor: pointer; font-weight: bold; }
.category { color: #00d4ff; font-size: 1.3em; margin: 20px 0 10px 0; border-left: 4px solid #00d4ff; padding-left: 10px; }
.secondary { color: #ff00ff; border-left: 4px solid #ff00ff; }
.copied { background: #ff00ff !important; color: white; }

#authBox { text-align:center; margin-top:120px; }
#mainContent { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
    <h2>ENTER ACCESS KEY</h2>
    <input type="text" id="keyInput" placeholder="Enter key">
    <br><br>
    <button onclick="checkKey()">Unlock</button>
    <p id="status"></p>
</div>

<!-- MAIN SITE -->
<div id="mainContent">

<h1>MOMENTUM v4 ENGINE</h1>
<div class="credit">MADE BY PICKLEMUNCHER417</div>

<div class="category">Attackers</div>
<div id="attack-grid" class="grid"></div>

<div class="category">Defenders</div>
<div id="defend-grid" class="grid"></div>

<div class="category secondary">Secondary SMGs</div>
<div id="secondary-grid" class="grid"></div>

</div>

<script>
/* ================= WHITELIST ================= */

const pastebinURL = "https://pastebin.com/raw/5Ss5zQ3k"; // YOUR LINK
let allowedKeys = [];

fetch(pastebinURL)
.then(res => res.text())
.then(data => {
    allowedKeys = data.split("\n").map(k => k.trim());
});

/* ===== 24H + 1 USER LOCK ===== */

const savedKey = localStorage.getItem("key");
const savedTime = localStorage.getItem("time");

if(savedKey && savedTime){
    const now = Date.now();
    const diff = now - parseInt(savedTime);

    if(diff < 86400000){ // 24 hours
        unlock();
    } else {
        localStorage.clear();
    }
}

function checkKey(){
    const input = document.getElementById("keyInput").value.trim();
    const status = document.getElementById("status");

    if(allowedKeys.includes(input)){

        // prevent reuse on same browser
        if(localStorage.getItem("key") && localStorage.getItem("key") !== input){
            status.innerText = "DEVICE ALREADY USED A KEY";
            return;
        }

        localStorage.setItem("key", input);
        localStorage.setItem("time", Date.now());

        unlock();
    } else {
        status.innerText = "INVALID KEY";
    }
}

function unlock(){
    document.getElementById("authBox").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}

/* ================= YOUR ORIGINAL DATA ================= */

const attackers = [
 {n:"Ash", w:"R4-C", y:52, x:-2}, {n:"Twitch", w:"F2", y:68, x:-3}, {n:"Ace/Fuze", w:"AK-12", y:48, x:-1},
 {n:"Buck", w:"C8-SFW", y:58, x:-2}, {n:"Sledge", w:"L85A2", y:35, x:0}, {n:"Thatcher", w:"AR33", y:42, x:-1},
 {n:"Thermite", w:"556xi", y:40, x:0}, {n:"IQ", w:"552 Commando", y:44, x:0}, {n:"Hibana", w:"Type-89", y:54, x:-2},
 {n:"Jackal", w:"C7E", y:45, x:0}, {n:"Zofia", w:"M762", y:62, x:3}, {n:"Nomad", w:"ARX200", y:44, x:0},
 {n:"Ace", w:"AK-12", y:48, x:-1}, {n:"Zero", w:"SC3000K", y:50, x:-1}, {n:"Ram", w:"R4-C", y:52, x:-2}
];

const defenders = [
 {n:"Smoke", w:"FMG-9", y:35, x:0}, {n:"Mute", w:"MP5K", y:38, x:0}, {n:"Jäger", w:"416-C", y:45, x:2},
 {n:"Bandit", w:"MP7", y:42, x:-1}, {n:"Valkyrie", w:"MPX", y:34, x:0}, {n:"Mira", w:"Vector", y:65, x:-4},
 {n:"Lesion", w:"T-5", y:38, x:0}, {n:"Ela", w:"Scorpion", y:75, x:5}, {n:"Vigil", w:"K1A", y:36, x:0},
 {n:"Mozzie", w:"Roni", y:40, x:0}, {n:"Melusi", w:"MP5", y:35, x:0}, {n:"Fenrir", w:"MP7", y:42, x:-1}
];

const secondaries = [
 {n:"Smoke/Mute", w:"SMG-11", y:85, x:-6},
 {n:"Hibana/Echo", w:"Bearing-9", y:88, x:5},
 {n:"Vigil/Dokkaebi", w:"SMG-12", y:105, x:10},
 {n:"Dokkaebi/Kali", w:"C75 Auto", y:55, x:0},
 {n:"Glaz/Kali", w:"SPSMG9", y:48, x:0}
];

/* ================= BUILD ================= */

function build(list, gridId){
    const grid = document.getElementById(gridId);
    list.forEach(op=>{
        const div = document.createElement('div');
        div.className = 'op-card';
        div.innerHTML = `<strong>${op.n}</strong>
        <div class="weapon">${op.w}</div>
        <button onclick="copy(this, ${op.y}, ${op.x})">GET V4 ENGINE</button>`;
        grid.appendChild(div);
    });
}

/* ================= COPY ================= */

function copy(btn, y, x){
    const code = "recoilX=" + x + "\\nrecoilY=" + y;
    navigator.clipboard.writeText(code);

    btn.innerText = "COPIED!";
    btn.className = "copied";
    setTimeout(()=>{ btn.innerText="GET V4 ENGINE"; btn.className=""; },1500);
}

/* ================= INIT ================= */

build(attackers, 'attack-grid');
build(defenders, 'defend-grid');
build(secondaries, 'secondary-grid');

</script>
</body>
</html>
