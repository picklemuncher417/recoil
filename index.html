        h1 { text-align: center; color: #fff; text-shadow: 0 0 10px #00d4ff; margin-bottom: 5px; }

        @keyframes softRainbow {
            0%   { color: #4ade80; border-color: #4ade80; } 
            20%  { color: #60a5fa; border-color: #60a5fa; } 
            40%  { color: #a78bfa; border-color: #a78bfa; } 
            60%  { color: #f472b6; border-color: #f472b6; } 
            80%  { color: #fbbf24; border-color: #fbbf24; } 
            100% { color: #4ade80; border-color: #4ade80; } 
        }

        @keyframes buttonRainbow {
            0%   { background-color: #4ade80; }
            20%  { background-color: #60a5fa; }
            40%  { background-color: #a78bfa; }
            60%  { background-color: #f472b6; }
            80%  { background-color: #fbbf24; }
            100% { background-color: #4ade80; }

        .credit { text-align: center; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; animation: softRainbow 20s ease-in-out infinite; }

        .op-card strong { animation: softRainbow 20s ease-in-out infinite; display: block; }
        button { animation: buttonRainbow 20s ease-in-out infinite; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: none; }
        button:hover { opacity: 0.8; }
        .category { font-size: 1.3em; margin: 30px 0 10px 0; border-left: 4px solid; padding-left: 10px; text-transform: uppercase; animation: softRainbow 20s ease-in-out infinite; }
        .copied { background: #ff00ff !important; color: white !important; animation: none; }
        #search-container { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .op-card { background: #111; padding: 12px; border: 1px solid #333; border-radius: 4px; display: flex; flex-direction: column; position: relative; }
        .weapon { color: #888; font-size: 0.75em; margin-bottom: 8px; }
        .fav-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; color: #333; font-size: 1.2em; }
        .fav-btn.active { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }

        }

            // DPI SCALING (Calculated for 5950 DPI)
            const dpiScale = 0.32; 
            // USER CONTROL (25% for hard guns, 35% for easy guns)
            const assistStrength = easy ? 0.65 : 0.75;

            const finalY = (y * dpiScale * assistStrength).toFixed(2);
            const finalX = (x * dpiScale * assistStrength).toFixed(2);

  [ MODULE: MOMENTUM v4 ]    [ BUILD: 2026.04 ]   [ DEV: NOMALY ]
  [ OPTIMIZED FOR: ${name} (${gun}) ]   [ USER CONTROL: ${easy ? '35%' : '25%'} ]
--]]

EnablePrimaryMouseButtonEvents(true);

-- [[ CONFIGURATION ]]
local recoilX = ${finalX}
local recoilY = ${finalY}
local key = "capslock"

-- [[ STEALTH ENGINE STATE ]]
local driftX = 0
local driftY = 0

function OnEvent(event, arg)
    if IsKeyLockOn(key) then
        if IsMouseButtonPressed(3) and IsMouseButtonPressed(1) then
            
            local shotPower = math.random(-2, 2) 
            local shotBias = math.random(-1, 1)  
            local shotSpeed = math.random(-2, 2) 

            -- Reaction Delay
            Sleep(math.random(15, 45)) 

            repeat
                -- MOMENTUM DRIFT
                driftX = driftX + (math.random(-8, 8) / 10) 
                driftY = driftY + (math.random(-8, 8) / 10)

                if math.abs(driftY) > 3.5 then driftY = driftY * 0.7 end

                local jitterX = math.random(-1, 1)
                local jitterY = math.random(-1, 1)

            favorites = favorites.includes(name) ? favorites.filter(f => f !== name) : [...favorites, name];
            localStorage.setItem('favGuns', JSON.stringify(favorites));
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            const favGrid = document.getElementById('fav-grid');
            const favData = allGuns.filter(op => favorites.includes(op.n));
            document.getElementById('favorites-section').style.display = favData.length ? 'block' : 'none';

            const types = ["Entry", "Flex", "Support", "Anchor", "Roamer", "Trap"];
            types.forEach(type => {
                const ops = allGuns.filter(o => o.t === type);
                if (ops.length) {
                    const section = document.createElement('div');
                    section.innerHTML = `<div class="category">${type}</div><div class="grid">${ops.map(buildCard).join('')}</div>`;
                    container.appendChild(section);
                }
            });
            filterCards(document.getElementById('search-bar').value);
        }

        function filterCards(term) {
            term = term.toLowerCase();
            document.querySelectorAll('.op-card').forEach(card => {
                card.style.display = (card.dataset.name.includes(term) || card.dataset.weapon.includes(term)) ? 'flex' : 'none';
            });
        }

        document.getElementById('search-bar').addEventListener('input', (e) => filterCards(e.target.value));
